<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Criar Conta | NewLook</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../js/tailwind.config.js"></script>
    <link rel="stylesheet" href="../css/style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined" rel="stylesheet"/>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md flex flex-col gap-8">
        <h1 class="font-display-lg text-display-lg text-primary">NewLook</h1>
        <div>
            <h2 class="font-headline-xl text-headline-xl text-on-surface">Criar conta</h2>
            <p class="font-body-md text-on-surface-variant">É rápido e fácil! Comece agora.</p>
        </div>
        <form id="register-form" class="flex flex-col gap-6">
            <div class="flex flex-col gap-4">
                <div>
                    <label for="name" class="font-label-md text-secondary uppercase">Nome completo</label>
                    <input id="name" type="text" placeholder="Ex: Maria Silva" class="auth-input w-full rounded-lg px-4 py-3 font-body-md text-on-surface bg-white mt-1">
                </div>
                <div>
                    <label for="email" class="font-label-md text-secondary uppercase">E-mail</label>
                    <input id="email" type="email" placeholder="seu@email.com" class="auth-input w-full rounded-lg px-4 py-3 font-body-md text-on-surface bg-white mt-1">
                </div>
                <div>
                    <label for="password" class="font-label-md text-secondary uppercase">Senha</label>
                    <!-- type="password": oculta os caracteres digitados -->
                    <input id="password" type="password" placeholder="******" class="auth-input w-full rounded-lg px-4 py-3 font-body-md text-on-surface bg-white mt-1">
                </div>
                <div>
                    <label for="confirm_password" class="font-label-md text-secondary uppercase">Confirmar senha</label>
                    <input id="confirm_password" type="password" placeholder="******" class="auth-input w-full rounded-lg px-4 py-3 font-body-md text-on-surface bg-white mt-1">
                </div>
                <div>
                    <label for="genero" class="font-label-md text-secondary uppercase">Gênero</label>
                    <!-- <select>: dropdown com opções pré-definidas -->
                    <select id="genero" class="auth-input w-full rounded-lg px-4 py-3 font-body-md text-on-surface bg-white mt-1">
                        <option value="">Prefiro não informar</option>
                        <option value="feminino">Feminino</option>
                        <option value="masculino">Masculino</option>
                        <option value="nao-binario">Não-binário</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>
            </div>
            <button id="register-btn" type="submit" class="auth-btn bg-primary text-on-primary py-4 rounded-lg font-headline-lg hover:opacity-90 transition-opacity">Criar conta</button>
        </form>
        <p class="text-center font-body-md text-on-surface-variant">
            Já tem uma conta? <a href="login.html" class="text-primary font-bold hover:underline">Faça login</a>
        </p>
    </div>
    <script src="../js/register.js"></script>
</body>
</html>
