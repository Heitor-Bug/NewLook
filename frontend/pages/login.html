<!DOCTYPE html> <!-- HTML5 -->
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <!-- viewport: escala correta em mobile (sem zoom forçado) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | NewLook</title>
    <!-- Tailwind via CDN + config -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../js/tailwind.config.js"></script>
    <link rel="stylesheet" href="../css/style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined" rel="stylesheet"/>
</head>
<!--
    min-h-screen: altura mínima = viewport.
    flex items-center justify-center: centraliza tudo.
    p-6: padding lateral em mobile.
-->
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md flex flex-col gap-8">
        <h1 class="font-display-lg text-display-lg text-primary">NewLook</h1>
        <div>
            <h2 class="font-headline-xl text-headline-xl text-on-surface">Login</h2>
            <p class="font-body-md text-on-surface-variant">Bem-vindo de volta! Faça login para continuar.</p>
        </div>
        <form id="login-form" class="flex flex-col gap-6">
            <div class="flex flex-col gap-4">
                <div>
                    <label for="email" class="font-label-md text-secondary uppercase">E-mail</label>
                    <!--
                        auth-input: classe do style.css com borda #e5e5e5.
                        rounded-lg: borda arredondada.
                        py-3: padding vertical 12px.
                    -->
                    <input id="email" type="email" placeholder="nome@exemplo.com" class="auth-input w-full rounded-lg px-4 py-3 font-body-md text-on-surface bg-white mt-1">
                </div>
                <div>
                    <label for="password" class="font-label-md text-secondary uppercase">Senha</label>
                    <!--
                        relative + absolute: posiciona o olho (toggle senha) dentro do input.
                        translate-y-1/2: centraliza verticalmente.
                    -->
                    <div class="relative mt-1">
                        <input id="password" type="password" placeholder="******" class="auth-input w-full rounded-lg px-4 py-3 font-body-md text-on-surface bg-white">
                        <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant">
                            <span class="material-symbols-outlined text-[20px]">visibility</span>
                        </button>
                    </div>
                </div>
            </div>
            <button id="login-btn" type="submit" class="auth-btn bg-primary text-on-primary py-4 rounded-lg font-headline-lg hover:opacity-90 transition-opacity">Entrar</button>
        </form>
        <!-- Link para cadastro -->
        <p class="text-center font-body-md text-on-surface-variant">
            Ainda não tem uma conta? <a href="register.html" class="text-primary font-bold hover:underline">Cadastre-se</a>
        </p>
    </div>
    <script src="../js/login.js"></script>
</body>
</html>
