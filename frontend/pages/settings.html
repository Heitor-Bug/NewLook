<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Configurações | NewLook</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../js/tailwind.config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/style.css"/>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex">

<!-- Sidebar -->
<aside class="w-64 h-full fixed left-0 top-0 bg-surface border-r border-outline-variant flex flex-col py-margin-desktop px-4 gap-8 z-50">
    <div class="font-display-lg text-headline-lg tracking-tight text-primary px-4">NewLook</div>
    <nav class="flex flex-col gap-1">
        <a data-nav="generate" href="index.html" class="flex items-center gap-4 text-on-surface-variant px-4 py-3 hover:bg-surface-container-low transition-colors rounded-lg">
            <span class="material-symbols-outlined">auto_awesome</span>
            <span class="font-body-md">Gerar Looks</span>
        </a>
        <a data-nav="looks" href="looks.html" class="flex items-center gap-4 text-on-surface-variant px-4 py-3 hover:bg-surface-container-low transition-colors rounded-lg">
            <span class="material-symbols-outlined">style</span>
            <span class="font-body-md">Meus Looks</span>
        </a>
        <a data-nav="settings" href="settings.html" class="flex items-center gap-4 px-4 py-3 rounded-lg">
            <span class="material-symbols-outlined">settings</span>
            <span class="font-body-md">Configurações</span>
        </a>
    </nav>
</aside>

<!--
    Main: layout igual às outras páginas.
    flex-1 ml-64: ocupa o resto da tela após a sidebar.
-->
<main class="flex-1 ml-64 flex flex-col min-h-screen">
    <header class="fixed top-0 right-0 w-[calc(100%-256px)] z-40 bg-surface/80 backdrop-blur-md border-b border-outline-variant flex justify-end items-center h-16 px-margin-desktop">
        <button onclick="handleLogout()" class="font-label-md uppercase tracking-wider text-on-surface-variant hover:text-primary transition-colors">Sair</button>
    </header>

    <div class="pt-24 pb-12 px-margin-desktop max-w-4xl mx-auto w-full flex-1">
        <header class="mb-12">
            <h2 class="font-headline-xl text-headline-xl text-primary mb-2">Configurações de Perfil</h2>
            <p class="text-on-surface-variant font-body-md">Gerencie suas informações pessoais.</p>
        </header>

        <form id="settings-form" class="space-y-12">
            <!-- Grid de campos: 2 colunas em desktop, 1 em mobile -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                <div>
                    <label class="font-label-md text-on-surface-variant uppercase" for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" class="w-full border border-outline-variant rounded-lg px-4 py-3 font-body-md bg-white mt-1">
                </div>
                <div>
                    <label class="font-label-md text-on-surface-variant uppercase" for="email">E-mail</label>
                    <input type="email" id="email" name="email" class="w-full border border-outline-variant rounded-lg px-4 py-3 font-body-md bg-white mt-1">
                </div>
                <div>
                    <label class="font-label-md text-on-surface-variant uppercase" for="genero">Gênero</label>
                    <select id="genero" class="w-full border border-outline-variant rounded-lg px-4 py-3 font-body-md bg-white mt-1">
                        <option value="">Prefiro não informar</option>
                        <option value="feminino">Feminino</option>
                        <option value="masculino">Masculino</option>
                        <option value="nao-binario">Não-binário</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>
            </div>

            <!-- Seção de segurança: redefinição de senha -->
            <div class="pt-8 border-t border-outline-variant">
                <h3 class="font-headline-lg text-headline-lg mb-6">Segurança</h3>
                <!--
                    flex-col md:flex-row: empilhado em mobile, lado a lado em desktop.
                    items-end: alinha os itens pela parte inferior.
                -->
                <div class="flex flex-col md:flex-row items-end gap-4">
                    <div class="flex-1">
                        <label class="font-label-md text-on-surface-variant uppercase" for="nova-senha">Nova Senha</label>
                        <input type="password" id="nova-senha" placeholder="******" class="w-full border border-outline-variant rounded-lg px-4 py-3 font-body-md bg-white mt-1">
                    </div>
                    <button type="button" id="reset-senha-btn" class="border border-outline-variant px-6 py-3 font-label-md text-on-surface hover:bg-surface-container-low transition-colors rounded-lg h-[48px]">Redefinir Senha</button>
                </div>
            </div>

            <!-- Botões de ação: salvar e cancelar -->
            <div class="flex items-center gap-4 pt-4">
                <button type="submit" id="save-btn" class="bg-primary text-on-primary px-10 py-4 font-label-md uppercase hover:opacity-90 transition-opacity rounded-lg">Salvar Alterações</button>
                <button type="button" onclick="window.location.href='index.html'" class="text-on-surface-variant px-10 py-4 font-label-md uppercase hover:text-primary transition-colors">Cancelar</button>
            </div>

            <!-- Zona crítica: exclusão de conta -->
            <div class="pt-16 border-t border-outline-variant">
                <div class="bg-error-container/20 p-8 rounded-lg border border-error/10">
                    <h4 class="text-error font-headline-lg mb-2">Zona Crítica</h4>
                    <p class="text-on-surface-variant font-body-md mb-6">Ao deletar sua conta, todos os seus dados, favoritos e histórico de looks gerados pela IA serão permanentemente removidos.</p>
                    <button type="button" id="delete-account-btn" class="text-error font-label-md underline hover:opacity-70 transition-opacity uppercase">Excluir minha conta permanentemente</button>
                </div>
            </div>
        </form>
    </div>
</main>

<script src="../js/nav.js"></script>
<script src="../js/settings.js"></script>
<script>
    document.querySelector('[data-nav="settings"]').classList.add('nav-active');
</script>
</body>
</html>
